<!doctype html>
<div id="container"></div>
<script src="../lib/d3.v7.js"></script>
<script type="module">
  // Declare the chart dimensions and margins.
  const width = 1000;
  const height = 400;
  const marginTop = 20;
  const marginRight = 20;
  const marginBottom = 30;
  const marginLeft = 55;

  const getLocalMaxima = (data) => {
    const localMaxima = [];
    for (let i = 1; i < data.length - 1; i++) {
      if (data[i] > data[i - 1] && data[i] > data[i + 1]) {
        localMaxima.push(data[i]);
      }
    }
    return localMaxima;
  };

  const getLocalMinima = (data) => {
    const localMinima = [];
    for (let i = 1; i < data.length - 1; i++) {
      if (data[i] < data[i - 1] && data[i] < data[i + 1]) {
        localMinima.push(data[i]);
      }
    }
    return localMinima;
  };

  // Create the SVG container.
  const svg = d3.create("svg").attr("width", width * 1.25).attr("height", height * 1.25);

  // Declare dependepnt variable
  const world_youth_unemployement_2000_2025 = [
    14.267700443215, 14.482476288233, 14.8761808524599, 14.9950423666113,
    14.840542669043, 14.8820878672376, 14.5066496136631, 14.1525335814918,
    14.3385874024958, 15.2834887934357, 15.2274268208786, 15.3131593612541,
    15.6790637599771, 15.688531731258, 15.6010875515714, 15.9570393625742,
    16.0420057422403, 16.0753513132444, 15.8902161012964, 15.2535897614854,
    17.0977967239717, 15.6599774357967, 14.1324790309189, 13.3650029579599,
    13.2983540637608, 13.4074006990679,
  ];

  const aggregateData = world_youth_unemployement_2000_2025.map((d, i) => ({
    Date: new Date(2000 + i, 0, 1),
    Value: d,
  }));

  // Declare the x (horizontal position) scale.
  const x = d3
    .scaleUtc()
    .domain([new Date("2000-01-01"), new Date("2025-01-01")])
    .range([marginLeft, width - marginRight]);

  const xAxis = d3.axisBottom(x).ticks(d3.utcYear.every(2));

  // Declare the y (vertical position) scale.
  const y = d3
    .scaleLinear()
    .domain([d3.min(world_youth_unemployement_2000_2025), d3.max(world_youth_unemployement_2000_2025)])
    .nice()
    .range([height - marginBottom, marginTop]);

  // Create a line path that normalizes the value with respect to the base.
  const line = d3
    .line()
    .x((d) => x(d.Date))
    .y((d) => y(d.Value));

  svg
    .append("path")
    .datum(aggregateData)
    .attr("fill", "none")
    .attr("stroke", "steelblue")
    .attr("stroke-width", 1.5)
    .attr("stroke-linejoin", "round")
    .attr("stroke-linecap", "round")
    .attr("d", line);

    const maxima = getLocalMaxima(world_youth_unemployement_2000_2025);
  // Add the line
  svg.selectAll("highlights")
    .data(aggregateData.filter(d => maxima.includes(d.Value)))
    .enter()
    .append("circle")
      .attr("fill", "red")
      .attr("stroke", "none")
      .attr("cx", function(d) { return x(d.Date) })
      .attr("cy", function(d) { return y(d.Value) })
      .attr("r", 5);


      const minima = getLocalMinima(world_youth_unemployement_2000_2025);
    // Add the line
    svg.selectAll("highlights")
      .data(aggregateData.filter(d => minima.includes(d.Value)))
      .enter()
      .append("circle")
        .attr("fill", "green")
        .attr("stroke", "none")
        .attr("cx", function(d) { return x(d.Date) })
        .attr("cy", function(d) { return y(d.Value) })
        .attr("r", function(d) { return 5 });

  // Add the x-axis.
  svg
    .append("g")
    .attr("transform", `translate(0,${height - marginBottom})`)
    .call(xAxis);

  // Add the y-axis.
  svg
    .append("g")
    .attr("transform", `translate(${marginLeft},0)`)
    .call(d3.axisLeft(y));

    // Handmade legend
svg.append("circle").attr("cx",marginLeft + 30).attr("cy",marginTop + 5).attr("r", 6).style("fill", "red")
svg.append("circle").attr("cx",marginLeft + 30).attr("cy",marginTop + 35).attr("r", 6).style("fill", "green")
svg.append("text").attr("x", marginLeft + 45).attr("y", marginTop + 10).text("Highs").style("font-size", "15px").attr("alignment-baseline","middle")
svg.append("text").attr("x", marginLeft + 45).attr("y", marginTop + 40).text("Lows").style("font-size", "15px").attr("alignment-baseline","middle")

svg.append("text")
    .attr("text-anchor", "middle")
    .attr("x", width / 2)
    .attr("y", height + 10)
    .text("Year (year)");

svg.append("text")
    .attr("text-anchor", "middle")
    .attr("y", 0)
    .attr("x", -height / 2 + marginTop / 2)
    .attr("dy", ".75em")
    .attr("transform", "rotate(-90)")
    .text("Unemployment, youth total (%)");


  // Append the SVG element.
  container.append(svg.node());
</script>
